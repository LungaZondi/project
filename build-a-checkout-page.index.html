<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
<h1>Checkout</h1>
<section>
    <h2>Your Cart</h2>
    <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="A Rubic Cube">
    </section>
    <section>
        <h2>Payment Information</h2>
        <form>
<label for="card-number">
  Card Number <span aria-hidden="true">*</span>
</label>

<input 
  id="card-number" 
  name="card-number" 
  type="text" 
  inputmode="numeric" 
  aria-describedby="card-number-help" 
  placeholder="0000 0000 0000 0000" 
  required
>

<p id="card-number-help">
  Enter your 16-digit card number without spaces or dashes.
</p>
<input id="card-name" name="card-name" type="text" required>
<label for="card-name">Card Name
 <span aria-hidden="true">*</span>   
</label>
            </form>
        </section>
</body>

</html>
